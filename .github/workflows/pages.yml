name: GitHub Pages

# Note: "Validate site" is a required status check on main, so it must report a
# result on every PR. The pull_request trigger is therefore not path-filtered —
# filtering it left the required check permanently "Expected" and blocked
# unrelated PRs from merging. The job is fast, and the deploy job stays gated to
# non-PR pushes, so only the push trigger keeps a path filter.

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "tools/check_privacy.py"
      - "tools/check_site_content.py"
      - "tools/test_check_site_content.py"
      - "tools/test_check_privacy.py"
      - "crates/upyr-core/src/auto_correct.rs"
      - "crates/upyr-core/assets/dictionaries/*.txt"
      - "crates/upyr-core/assets/models/language.ngm"
      - ".github/workflows/pages.yml"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Validate site
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify site entrypoint
        run: test -s site/index.html
      - name: Verify release version synchronization
        run: python3 tools/check_version_sync.py
      - name: Verify site script syntax
        run: node --check site/app.js
      - name: Verify bilingual product tour and model trace
        run: python3 tools/check_site_content.py
      - name: Test site contracts
        run: python3 -m unittest tools.test_check_site_content tools.test_check_privacy
      - name: Verify non-tracking site resources
        run: python3 tools/check_privacy.py
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site
          retention-days: 1

  deploy:
    name: Deploy site
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
