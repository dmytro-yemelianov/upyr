name: OSV-Scanner

# Cross-ecosystem CVE scan (Rust, GitHub Actions, and any JS in the tree)
# against the OSV.dev database. Complements the RustSec advisory audit in
# security.yml, which is Rust-only. Runs post-merge and on a schedule so it
# does not gate pull requests.

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 7 * * 1" # Mondays 07:17 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: osv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: OSV scan
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run OSV-Scanner
        id: osv
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --recursive
            --format=table
            --output=osv-scan-report.txt
            ./

      - name: Surface findings in job summary
        if: always()
        run: |
          {
            echo "## OSV-Scanner findings"
            echo
            echo '```'
            cat osv-scan-report.txt 2>/dev/null || echo "(no report produced)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: osv-scan-report
          path: osv-scan-report.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: Fail on findings
        if: steps.osv.outcome != 'success'
        run: |
          echo "::error::OSV-Scanner found vulnerabilities or failed — see job summary"
          exit 1
