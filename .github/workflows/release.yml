name: Release packages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install validation dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxtst-dev libxkbcommon-dev libwayland-dev libgtk-3-dev libayatana-appindicator3-dev zstd
      - run: python3 tools/check_codebase_graph.py
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test --workspace --all-targets --locked

  macos:
    needs: verify
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify release tag matches Cargo version
        if: startsWith(github.ref, 'refs/tags/v')
        run: packaging/macos/verify-release-tag.sh "$GITHUB_REF_NAME"
      - name: Validate Apple release credentials
        shell: bash
        run: |
          required=(
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
            APPLE_ID
            APPLE_APP_PASSWORD
            APPLE_TEAM_ID
          )
          missing=()
          present=0
          for name in "${required[@]}"; do
            if [[ -n "${!name:-}" ]]; then
              present=$((present + 1))
            else
              missing+=("$name")
            fi
          done

          if [[ "$GITHUB_REF" == refs/tags/v* && ${#missing[@]} -ne 0 ]]; then
            printf 'Tagged macOS releases require Apple signing and notarization credentials. Missing: %s\n' "${missing[*]}" >&2
            exit 1
          fi
          if [[ "$GITHUB_REF" != refs/tags/v* && $present -ne 0 && ${#missing[@]} -ne 0 ]]; then
            printf 'Apple release credentials must be supplied together. Missing: %s\n' "${missing[*]}" >&2
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Generate macOS icon from mascot source
        run: packaging/macos/generate-icon.sh
      - name: Build universal macOS binaries
        run: packaging/macos/build-universal.sh
      - name: Import Developer ID certificate
        if: env.APPLE_CERTIFICATE != ''
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/upyr.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/upyr-signing.keychain-db"
          printf '%s' "$APPLE_CERTIFICATE" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p temporary "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p temporary "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k temporary "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F '"' 'NR == 1 { print $2 }')
          test -n "$IDENTITY"
          case "$IDENTITY" in
            "Developer ID Application:"*) ;;
            *) echo "Certificate is not a Developer ID Application identity: $IDENTITY" >&2; exit 1 ;;
          esac
          echo "UPYR_MACOS_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
      - name: Build and verify app bundle
        run: bash packaging/macos/package.sh
      - name: Verify packaged conversion
        run: test "$(dist/Upyr.app/Contents/MacOS/upyr convert ghbdsn)" = "привіт"
      - uses: actions/upload-artifact@v4
        with:
          name: package-macos
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  windows:
    needs: verify
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      UPYR_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked -p upyr
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Prepare Windows signing
        if: env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          $certificate = Join-Path $env:RUNNER_TEMP "upyr.pfx"
          [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" | Sort-Object FullName | Select-Object -Last 1
          if (-not $signTool) { throw "signtool.exe was not found" }
          "UPYR_CERTIFICATE_PATH=$certificate" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "UPYR_SIGNTOOL_PATH=$($signTool.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build installer and portable package
        shell: pwsh
        run: ./packaging/windows/package.ps1
      - name: Verify packaged conversion
        shell: pwsh
        run: |
          $cli = Get-ChildItem dist/upyr-windows-x86_64-*/upyr.exe | Select-Object -First 1
          if ((& $cli.FullName convert ghbdsn) -ne "привіт") { throw "Packaged conversion smoke test failed" }
      - uses: actions/upload-artifact@v4
        with:
          name: package-windows
          path: |
            dist/*-setup.exe
            dist/*.zip
          if-no-files-found: error

  linux:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxtst-dev libxkbcommon-dev libwayland-dev libgtk-3-dev libayatana-appindicator3-dev
      - run: cargo build --release --locked -p upyr
      - name: Build DEB and portable package
        run: bash packaging/linux/package.sh
      - name: Verify packaged conversion
        run: test "$(find dist/upyr-linux-* -type f -name upyr -perm -111 -exec {} convert ghbdsn \; -quit)" = "привіт"
      - uses: actions/upload-artifact@v4
        with:
          name: package-linux
          path: |
            dist/*.deb
            dist/*.tar.gz
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [verify, macos, windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
