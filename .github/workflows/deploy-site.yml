name: Deploy site

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "tools/check_privacy.py"
      - "tools/check_site_content.py"
      - "tools/test_check_site_content.py"
      - "tools/test_check_privacy.py"
      - "tools/build_site_wasm.sh"
      - "tools/generate_releases_page.py"
      - "crates/upyr-wasm/**"
      - "crates/upyr-core/**"
      - "Cargo.lock"
      - "CHANGELOG.md"
      - ".github/workflows/deploy-site.yml"
  pull_request:
    branches:
      - main
    paths:
      - "site/**"
      - "tools/check_privacy.py"
      - "tools/check_site_content.py"
      - "tools/test_check_site_content.py"
      - "tools/test_check_privacy.py"
      - "tools/build_site_wasm.sh"
      - "tools/generate_releases_page.py"
      - "crates/upyr-wasm/**"
      - "crates/upyr-core/**"
      - "Cargo.lock"
      - "CHANGELOG.md"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Validate and deploy site
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust and WASM target
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.88.0
          targets: wasm32-unknown-unknown
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked
      - name: Build the live-demo WASM bundle
        run: sh tools/build_site_wasm.sh
      - name: Install size-check tools
        run: |
          sudo apt-get update
          sudo apt-get install -y brotli
      - name: Enforce WASM size budget for the live demo
        run: python3 tools/check_wasm_size.py site/wasm/upyr_wasm_bg.wasm
      - name: Generate the releases page from CHANGELOG.md
        run: python3 tools/generate_releases_page.py
      - name: Verify site entrypoint
        run: test -s site/index.html
      - name: Verify release version synchronization
        run: python3 tools/check_version_sync.py
      - name: Verify site script syntax
        run: node --check site/app.js
      - name: Verify bilingual product tour and model trace
        run: python3 tools/check_site_content.py
      - name: Test site contracts
        run: python3 -m unittest tools.test_check_site_content tools.test_check_privacy
      - name: Verify non-tracking site resources
        run: python3 tools/check_privacy.py
      - name: Deploy to Cloudflare Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy site --project-name=upyr --branch=main
