name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxtst-dev libxkbcommon-dev libwayland-dev libgtk-3-dev libayatana-appindicator3-dev
      - run: cargo test --workspace --all-targets --locked

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install WASM test and size tools
        run: |
          cargo install wasm-bindgen-cli --version 0.2.126 --locked
          sudo apt-get update
          sudo apt-get install -y brotli
      - run: cargo check -p upyr-core -p upyr-wasm --all-targets --target wasm32-unknown-unknown --locked
      - name: Run WASM/Node contract tests
        run: cargo test -p upyr-wasm --target wasm32-unknown-unknown --locked
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER: wasm-bindgen-test-runner
      - run: cargo build --release -p upyr-wasm --target wasm32-unknown-unknown --locked
      - run: wasm-bindgen --target nodejs --out-dir target/upyr-wasm-node target/wasm32-unknown-unknown/release/upyr_wasm.wasm
      - run: node tools/smoke_wasm_node.cjs target/upyr-wasm-node/upyr_wasm.js
      - run: python3 tools/check_wasm_size.py target/upyr-wasm-node/upyr_wasm_bg.wasm

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libx11-dev libxtst-dev libxkbcommon-dev libwayland-dev libgtk-3-dev libayatana-appindicator3-dev zstd
      - run: python3 tools/check_codebase_graph.py
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
