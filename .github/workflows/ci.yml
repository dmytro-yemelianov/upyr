name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  msrv:
    name: Minimum Rust 1.87
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install minimum supported Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.87.0
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxkbcommon-dev
      - name: Check the workspace at the MSRV
        run: cargo check --workspace --all-targets --locked

  test:
    name: Test (${{ matrix.os }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxkbcommon-dev
      - name: Run workspace tests
        run: cargo test --workspace --all-targets --locked

  wasm:
    name: WASM contract
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust and WASM target
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.88.0
          targets: wasm32-unknown-unknown
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install WASM test and size tools
        run: |
          cargo install wasm-bindgen-cli --version 0.2.126 --locked
          sudo apt-get update
          sudo apt-get install -y brotli
      - name: Check WASM crates
        run: cargo check -p upyr-core -p upyr-wasm --all-targets --target wasm32-unknown-unknown --locked
      - name: Run WASM/Node contract tests
        run: cargo test -p upyr-wasm --target wasm32-unknown-unknown --locked
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER: wasm-bindgen-test-runner
      - name: Build WASM release
        run: cargo build --release -p upyr-wasm --target wasm32-unknown-unknown --locked
      - name: Generate Node bindings
        run: >-
          wasm-bindgen --target nodejs --out-dir target/upyr-wasm-node
          target/wasm32-unknown-unknown/release/upyr_wasm.wasm
      - name: Smoke-test Node bindings
        run: node tools/smoke_wasm_node.cjs target/upyr-wasm-node/upyr_wasm.js
      - name: Enforce WASM size budget
        run: python3 tools/check_wasm_size.py target/upyr-wasm-node/upyr_wasm_bg.wasm

  quality:
    name: Formatting, Clippy, and graph
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust quality tools
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install Linux validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxkbcommon-dev zstd
      - name: Verify codebase graph artifact
        run: python3 tools/check_codebase_graph.py
      - name: Verify release version synchronization
        run: python3 tools/check_version_sync.py
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
